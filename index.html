<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Trace Of Ruin</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.0/p5.js"></script>
</head>
<body>
  <svg width="0" height="0" style="position:absolute;" xmlns="http://www.w3.org/2000/svg">
  <filter id="chap4-water-filter" x="-25%" y="-25%" width="150%" height="150%">
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.025 0.055"
      numOctaves="3"
      seed="8"
      result="turbulence">
      <animate
        attributeName="baseFrequency"
        dur="30s"
        keyTimes="0;0.5;1"
        values="0.025 0.05; 0.06 0.09; 0.025 0.05"
        repeatCount="indefinite" />
    </feTurbulence>

    <feDisplacementMap
      in="SourceGraphic"
      in2="turbulence"
      scale="34"
      xChannelSelector="R"
      yChannelSelector="G" />
  </filter>
</svg>
  
  <div id="tv-container">
    <div class="pola-wrapper" id="pola-wrapper">
      <img class="pola-part pola-shadow" src="image/home/shadow.png">
      
      <img class="pola-part pola-item" id="p1" src="image/home/pola1.png">
      <img class="pola-part pola-item" id="p2" src="image/home/pola2.png">
      <img class="pola-part pola-item" id="p3" src="image/home/pola3.png">
      <img class="pola-part pola-item" id="p4" src="image/home/pola4.png">
      <img class="pola-part pola-item" id="p5" src="image/home/pola5.png">
      <img class="pola-part pola-item" id="p6" src="image/home/pola6.png">
      <img class="pola-part pola-item" id="p7" src="image/home/pola7.png">
      <img class="pola-part pola-item" id="p8" src="image/home/pola8.png">
      <img class="pola-part pola-item" id="p9" src="image/home/pola9.png">
      <img class="pola-part pola-item" id="p10" src="image/home/pola10.png">
      <img class="pola-part pola-item" id="p11" src="image/home/pola11.png">
      <img class="pola-part pola-item" id="p12" src="image/home/pola12.png">

      <img class="pola-full" src="image/home/polafull.png">
    </div>

    <div class="paper-wrapper" id="paper-wrapper">
      <img class="family-img" id="img-dad" src="image/chap1/dad.png" alt="Dad">
      <img class="family-img" id="img-mom" src="image/chap1/mom.png" alt="Mom">
      <img class="family-img" id="img-girl" src="image/chap1/girl.png" alt="Girl">
      <img class="family-img" id="img-sis" src="image/chap1/sis.png" alt="Sis">
    </div>

    <img class="tv-frame" src="image/home/tv-frame.png" alt="TV Frame">
  </div>
